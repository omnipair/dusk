name: Manual Dusk Buffer Deploy

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Network"
        required: false
        type: choice
        options:
          - mainnet-beta
          - devnet
        default: mainnet-beta
      source:
        description: "Binary source"
        required: false
        type: choice
        options:
          - release
          - artifact
          - local
        default: release
      release_tag:
        description: "Release tag, empty for latest"
        required: false
      artifact_name:
        description: "Artifact name, only when source=artifact"
        required: false
      priority_fee:
        description: "Priority fee in micro-lamports"
        required: false
        default: "50000"
      transfer_to_squads:
        description: "Transfer buffer authority to Squads vault"
        type: boolean
        default: true

env:
  SOLANA_VERSION: "4.1.0"
  PROGRAM_SO: omnipair_v2.so

jobs:
  deploy-buffer:
    runs-on: ubuntu-22.04
    outputs:
      buffer_address: ${{ steps.buffer.outputs.address }}
      program_id: ${{ steps.program.outputs.program_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Dusk program ID
        id: program
        run: |
          PROGRAM_ID=$(grep 'declare_id!' programs/omnipair-v2/src/lib.rs | sed 's/declare_id!("//;s/");$//')
          echo "PROGRAM_ID=$PROGRAM_ID" >> "$GITHUB_ENV"
          echo "program_id=$PROGRAM_ID" >> "$GITHUB_OUTPUT"
          echo "Dusk program ID: $PROGRAM_ID"

      - name: Guard mainnet buffer deployment
        if: inputs.network == 'mainnet-beta'
        run: |
          if [ "${{ vars.DUSK_MAINNET_BUFFER_DEPLOYS_ENABLED }}" != "true" ]; then
            echo "Mainnet buffer deployment is disabled."
            echo "Set repository variable DUSK_MAINNET_BUFFER_DEPLOYS_ENABLED=true only during an approved deployment window."
            {
              echo "### Mainnet buffer deploy blocked"
              echo ""
              echo "Mainnet buffer deployment requires repository variable \`DUSK_MAINNET_BUFFER_DEPLOYS_ENABLED=true\`."
              echo "Leave it unset or false until release checklist and owner signoff are complete."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          if [ "${{ inputs.source }}" != "release" ]; then
            echo "Mainnet buffer deployment must use source=release."
            exit 1
          fi

          if [ -z "${{ inputs.release_tag }}" ]; then
            echo "Mainnet buffer deployment requires an explicit release_tag."
            exit 1
          fi

          if [ "${{ inputs.transfer_to_squads }}" != "true" ]; then
            echo "Mainnet buffer deployment must transfer buffer authority to Squads."
            exit 1
          fi

          if [ -z "${{ vars.SQUADS_VAULT_ADDRESS }}" ]; then
            echo "SQUADS_VAULT_ADDRESS must be configured for mainnet buffer deployment."
            exit 1
          fi

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Setup deployer keypair
        run: |
          echo "${{ secrets.DEPLOYER_KEYPAIR }}" > deployer-keypair.json
          chmod 600 deployer-keypair.json

      - name: Download from GitHub Release
        if: inputs.source == 'release'
        run: |
          TAG="${{ inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          fi
          mkdir -p build
          gh release download "$TAG" -p "${{ env.PROGRAM_SO }}" -D build
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download from workflow artifact
        if: inputs.source == 'artifact'
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: build

      - name: Use local binary
        if: inputs.source == 'local'
        run: |
          mkdir -p build
          cp "verifiable-builds/${{ env.PROGRAM_SO }}" build/

      - name: Verify binary exists
        run: test -f "build/${{ env.PROGRAM_SO }}"

      - name: Determine RPC URL
        id: rpc
        run: |
          if [ "${{ inputs.network }}" = "mainnet-beta" ]; then
            RPC="${{ vars.MAINNET_RPC_URL }}"
            if [ -z "$RPC" ]; then
              RPC="https://api.mainnet-beta.solana.com"
            fi
          else
            RPC="https://api.devnet.solana.com"
          fi
          echo "url=$RPC" >> "$GITHUB_OUTPUT"

      - name: Generate buffer keypair
        run: solana-keygen new -s -o buffer-keypair.json --no-bip39-passphrase

      - name: Deploy buffer
        id: buffer
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 10
          shell: bash
          command: |
            solana program write-buffer \
              --keypair deployer-keypair.json \
              --buffer buffer-keypair.json \
              --max-sign-attempts 50 \
              --with-compute-unit-price ${{ inputs.priority_fee }} \
              --use-rpc \
              "build/${{ env.PROGRAM_SO }}" \
              -u ${{ steps.rpc.outputs.url }}
            echo "address=$(solana-keygen pubkey buffer-keypair.json)" >> "$GITHUB_OUTPUT"

      - name: Transfer authority to Squads
        if: inputs.transfer_to_squads == true && inputs.network == 'mainnet-beta'
        run: |
          if [ -z "${{ vars.SQUADS_VAULT_ADDRESS }}" ]; then
            echo "::warning::SQUADS_VAULT_ADDRESS is not configured"
            exit 0
          fi
          solana program set-buffer-authority \
            "$(solana-keygen pubkey buffer-keypair.json)" \
            --new-buffer-authority "${{ vars.SQUADS_VAULT_ADDRESS }}" \
            --keypair deployer-keypair.json \
            -u ${{ steps.rpc.outputs.url }}

      - name: Summary
        run: |
          echo "Buffer: $(solana-keygen pubkey buffer-keypair.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "Program: $PROGRAM_ID" >> "$GITHUB_STEP_SUMMARY"
          echo "Network: ${{ inputs.network }}" >> "$GITHUB_STEP_SUMMARY"
