name: release-build

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without v prefix"
        required: false
      bump_type:
        description: "Bump type when version is omitted"
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
        default: auto
      verify_only:
        description: "Build and verify without creating a release"
        type: boolean
        default: false

env:
  ANCHOR_VERSION: "0.31.1"
  SOLANA_VERSION: "1.18.18"
  PROGRAM_CRATE: omnipair-v2
  PROGRAM_LIBRARY: omnipair_v2
  PROGRAM_SO: omnipair_v2.so
  PROGRAM_IDL: omnipair_v2.json
  PROGRAM_TYPES: omnipair_v2.ts

jobs:
  prepare-release:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.verify_only != 'true')
    runs-on: ubuntu-22.04
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      bump_type: ${{ steps.version.outputs.bump_type }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Calculate release version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}
          SHOULD_RELEASE="true"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} 2>/dev/null || true)
            if ! echo "$CHANGED_FILES" | grep -Eq '^(programs/omnipair-v2/|programs/leverage_delegate/|packages/program-interface/|Anchor.toml|Cargo.toml|Cargo.lock)'; then
              SHOULD_RELEASE="false"
            fi
            COMMITS=$(git log --format="%s" ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} 2>/dev/null || git log --format="%s" -10)
            if echo "$COMMITS" | grep -qiE "^(feat|fix|refactor|perf|build|ci|docs|style|test|chore)(\(.+\))?!:|BREAKING CHANGE:"; then
              BUMP_TYPE="major"
            elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
              BUMP_TYPE="minor"
            elif echo "$COMMITS" | grep -qiE "^(fix|perf)(\(.+\))?:"; then
              BUMP_TYPE="patch"
            else
              SHOULD_RELEASE="false"
              BUMP_TYPE="none"
            fi
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            NEW_VERSION="${{ github.event.inputs.version }}"
            BUMP_TYPE="manual"
          else
            BUMP_TYPE="${{ github.event.inputs.bump_type }}"
            if [ "$BUMP_TYPE" = "auto" ]; then
              BUMP_TYPE="patch"
            fi
          fi

          if [ "$SHOULD_RELEASE" = "true" ] && [ "${BUMP_TYPE:-}" != "manual" ]; then
            case "$BUMP_TYPE" in
              major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
              minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
              patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
              *) SHOULD_RELEASE="false" ;;
            esac
          fi

          if [ "$SHOULD_RELEASE" = "true" ]; then
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          fi
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "bump_type=${BUMP_TYPE:-none}" >> "$GITHUB_OUTPUT"

  build-release:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      tag: ${{ needs.prepare-release.outputs.tag }}
      version: ${{ needs.prepare-release.outputs.version }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Extract Dusk program ID
        id: program
        run: |
          PROGRAM_ID=$(grep 'declare_id!' programs/omnipair-v2/src/lib.rs | sed 's/declare_id!("//;s/");$//')
          echo "program_id=$PROGRAM_ID" >> "$GITHUB_OUTPUT"

      - name: Bump versions
        id: bump
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" programs/omnipair-v2/Cargo.toml
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" packages/program-interface/package.json
          cargo metadata --format-version 1 > /dev/null
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add programs/omnipair-v2/Cargo.toml packages/program-interface/package.json Cargo.lock
          git commit -m "chore: bump version to $VERSION [skip ci]" || true
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "/home/runner/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --locked

      - name: Build verifiable Dusk artifact
        run: |
          cargo clean
          anchor build --verifiable -p "${{ env.PROGRAM_CRATE }}" \
            -e GIT_REV=${{ steps.bump.outputs.sha }} \
            -e GIT_RELEASE=${{ needs.prepare-release.outputs.tag }} \
            -- --features production

      - name: Verify required artifacts
        run: |
          for artifact in \
            "target/verifiable/${{ env.PROGRAM_SO }}" \
            "target/idl/${{ env.PROGRAM_IDL }}" \
            "target/types/${{ env.PROGRAM_TYPES }}"
          do
            test -f "$artifact"
          done
          strings "target/verifiable/${{ env.PROGRAM_SO }}" | grep -q source_release
          strings "target/verifiable/${{ env.PROGRAM_SO }}" | grep -q source_revision

      - name: Verify program interface matches build artifacts
        run: npm run check-idl-current --prefix packages/program-interface

      - name: Create and push tag
        run: |
          git tag -a ${{ needs.prepare-release.outputs.tag }} -m "Release ${{ needs.prepare-release.outputs.tag }}"
          git push origin ${{ needs.prepare-release.outputs.tag }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dusk-build-${{ needs.prepare-release.outputs.tag }}
          path: |
            target/verifiable/${{ env.PROGRAM_SO }}
            target/idl/${{ env.PROGRAM_IDL }}
            target/types/${{ env.PROGRAM_TYPES }}
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: Omnipair Dusk ${{ needs.prepare-release.outputs.tag }}
          body: |
            ## Omnipair Dusk ${{ needs.prepare-release.outputs.tag }}

            **Commit:** `${{ steps.bump.outputs.sha }}`
            **Program ID:** `${{ steps.program.outputs.program_id }}`

            ```bash
            solana-verify verify-from-repo \
              --remote \
              --program-id ${{ steps.program.outputs.program_id }} \
              https://github.com/${{ github.repository }} \
              --commit-hash ${{ steps.bump.outputs.sha }} \
              --library-name ${{ env.PROGRAM_LIBRARY }} \
              -- --features production \
                 --config "env.GIT_REV=\"${{ steps.bump.outputs.sha }}\"" \
                 --config "env.GIT_RELEASE=\"${{ needs.prepare-release.outputs.tag }}\""
            ```
          files: |
            target/verifiable/${{ env.PROGRAM_SO }}
            target/idl/${{ env.PROGRAM_IDL }}
            target/types/${{ env.PROGRAM_TYPES }}
          generate_release_notes: true
          make_latest: true

  verify-only:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.verify_only == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "/home/runner/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --locked

      - name: Build Dusk
        run: anchor build -p "${{ env.PROGRAM_CRATE }}" -- --features production

      - name: Verify program interface matches build artifacts
        run: npm run check-idl-current --prefix packages/program-interface

      - name: Test Dusk
        run: cargo test -p omnipair-v2

      - name: Test leverage delegate
        run: cargo test -p leverage_delegate
