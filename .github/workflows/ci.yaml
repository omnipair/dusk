name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"
      - "refactor/**"
      - "test/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: yarn

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install JavaScript dependencies
        run: yarn install --frozen-lockfile

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Check repository hygiene
        run: yarn check:hygiene

      - name: Check actionable Clippy warnings
        run: yarn check:clippy

      - name: Test Dusk program
        run: cargo test -p omnipair-v2

      - name: Check Dusk production features
        run: cargo check -p omnipair-v2 --lib --features production

      - name: Test Dusk production features
        run: cargo test -p omnipair-v2 --lib --features production

      - name: Test leverage delegate
        run: cargo test -p leverage_delegate

      - name: Typecheck test harness
        run: yarn typecheck

      - name: Typecheck program interface package
        run: npm run typecheck --prefix packages/program-interface
