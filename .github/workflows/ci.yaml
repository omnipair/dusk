name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install JavaScript dependencies
        run: yarn install --frozen-lockfile

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Test Dusk program
        run: cargo test -p omnipair-v2

      - name: Test leverage delegate
        run: cargo test -p leverage_delegate

      - name: Typecheck test harness
        run: yarn typecheck

      - name: Build program interface package
        run: npm run build --prefix packages/program-interface
